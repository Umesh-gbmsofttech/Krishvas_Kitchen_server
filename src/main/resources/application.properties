spring.application.name=Krishva-s-Kitchen

server.address=0.0.0.0
server.port=${PORT:8080}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/krishvas_kitchen?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn

app.jwt.secret=${JWT_SECRET:krishvas-kitchen-super-secret-change-this-in-prod-1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

app.admin.email=${ADMIN_EMAIL:admin@gmail.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.name=${ADMIN_NAME:Kitchen Admin}

api.keys.map.ors=${ORS_MAP}
api.keys.map.tiler=${MAP_TILER}

spring.jackson.time-zone=Asia/Kolkata
management.endpoints.web.exposure.include=health,info
